title: Tocaan Project API Documentation
description: Technical documentation for the Tocaan Laravel 13 assessment project

url: "https://gamalsobhy585.github.io"
baseurl: "/tocaan-project"

# Theme configuration

remote_theme: just-the-docs/just-the-docs
color_scheme: dark

# Plugins

plugins:

* jekyll-remote-theme

# Search configuration

search_enabled: true
search:
heading_level: 2
previews: 3
preview_words_before: 5
preview_words_after: 10
tokenizer_separator: /[\s/]+/
rel_url: true
button: false

# Navigation configuration

nav_enabled: true
nav_sort: case_insensitive
heading_anchors: true

# Header external links

aux_links:
"View on GitHub":
- "https://github.com/Gamalsobhy585/tocaan-project"

aux_links_new_tab: true

# Navigation external links

nav_external_links:

* title: Postman API Workspace
  url: https://martian-shadow-736975.postman.co/workspace/1fe9452d-f7b9-4ca3-a0a5-8e15ccfa4db8
  hide_icon: false
  opens_in_new_tab: true

* title: GitHub Repository
  url: https://github.com/Gamalsobhy585/tocaan-project
  hide_icon: false
  opens_in_new_tab: true

# Footer

footer_content: "© 2026 Tocaan Project. Laravel 13 technical assessment documentation."

# Excluded directories

exclude:

* node_modules/
* vendor/

# Markdown configuration

markdown: kramdown

kramdown:
input: GFM
syntax_highlighter: rouge
syntax_highlighter_opts:
block:
line_numbers: false

# Generate clean URLs

permalink: pretty

# Browser favicon

favicon_ico: "/tocaan-project/assets/images.jpg"
